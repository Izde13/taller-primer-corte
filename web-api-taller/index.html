<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Catálogo de Películas</title>
  <link rel="stylesheet" href="css/styles.css">
  <meta name="color-scheme" content="light dark">
</head>
<body>
  <header class="site-header">
    <div class="brand">
      <span class="logo-dot"></span>
      <h1 class="logo">Cine<span>Flex</span></h1>
    </div>

    <div class="header-actions">
      <!-- Theme toggle -->
      <button id="themeToggle" class="icon-btn" aria-label="Cambiar tema" title="Cambiar tema">
        <!-- ícono cambia vía CSS -->
        <span class="icon theme"></span>
      </button>
    </div>
  </header>

  <nav class="top-controls">
    <div class="pill-group" role="tablist" aria-label="Colecciones">
      <button id="btnBatman" class="pill active" aria-pressed="true" role="tab">Batman</button>
      <button id="btnMarvel" class="pill" aria-pressed="false" role="tab">Marvel</button>
      <button id="btnStarWars" class="pill" aria-pressed="false" role="tab">Star Wars</button>
    </div>

    <div class="mode-group">
      <label class="switch">
        <input id="toggleMode" type="checkbox" />
        <span class="slider"></span>
      </label>
      <span class="switch-label">Usar API real</span>

      <input id="apikey" class="apikey" placeholder="OMDb API Key">
    </div>
  </nav>

  <!-- Hero -->
  <section id="hero" class="hero" aria-label="Destacado">
    <div class="hero-bg" id="heroBg" aria-hidden="true"></div>
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <h2 id="heroTitle">Explora y descubre</h2>
      <p id="heroSubtitle" class="muted">Elige una colección y navega por el catálogo.</p>
    </div>
  </section>

  <main class="container">
    <div class="stats">
      Total reportado: <span id="total">0</span> · Mostrando: <span id="count">0</span>
    </div>

    <section id="status" class="sr-only" aria-live="polite"></section>

    <section id="grid" class="grid" aria-label="Listado de películas"></section>

    <nav id="pagination" class="pagination" aria-label="Paginación">
      <button id="prevBtn" disabled>Anterior</button>
      <button id="nextBtn" disabled>Siguiente</button>
    </nav>
  </main>

  <!-- (Opcional) también podrías definir la key global así:
  <script>window.OMDB_API_KEY = "TU_API_KEY_REAL";</script>
  -->

  <script src="js/app.js"></script>
</body>
</html>
